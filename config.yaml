data:
  raw_path: data/raw/telco.csv
  processed_path: data/processed/features.csv
  target_column: Churn
  dataset_url: "https://raw.githubusercontent.com/IBM/telco-customer-churn-on-icp4d/master/data/Telco-Customer-Churn.csv"

features:
  numeric:
    - tenure
    - MonthlyCharges
    - TotalCharges
  categorical:
    - gender
    - SeniorCitizen
    - Partner
    - Dependents
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod
  drop:
    - customerID

model:
  artifact_path: models/churn_model.pkl
  pipeline_path: models/pipeline.pkl
  test_size: 0.2
  random_state: 42
  xgboost_params:
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: 3  # handles class imbalance
    eval_metric: auc

api:
  host: 0.0.0.0
  port: 8000
  model_path: models/churn_model.pkl
  pipeline_path: models/pipeline.pkl

monitoring:
  reference_data_path: data/processed/features.csv
  drift_threshold: 0.15
